<!doctype html>
<html>
<head>
 <meta charset="utf-8">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
 <style>
 body { background: #0d1117; color: #c9d1d9; display:flex; align-items:center; justify-content:center; height:100vh; }
 .card { background:#161b22; border:1px solid #30363d; border-radius:16px; padding:24px; width: 720px; }
 .title { font-size: 2rem; font-weight:700; color:#58a6ff; }
 .rowline { display:flex; justify-content:space-between; margin-top:8px; }
 .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color:#8b949e; }
 .muted { color:#8b949e; }
 </style>
</head>
<body>
<div class="card">
 <div class="title mb-3">{{ title }}</div>
 <div class="rowline"><span><strong>Name</strong></span><span>{{ name }}</span></div>
 <div class="rowline"><span><strong>GitHub</strong></span><span class="mono">{{ github }}</span></div>
 <div class="rowline"><span><strong>edX</strong></span><span class="mono">{{ edx }}</span></div>
 <div class="rowline"><span><strong>City / Country</strong></span><span>{{ city }} — {{ country }}</span></div>
 <div class="rowline"><span><strong>Date</strong></span><span>{{ date }}</span></div>
 <div class="mt-3 muted">Tip: change values via the URL query string before recording.</div>
</div>
</body>
</html>
