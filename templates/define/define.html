{% extends 'base.html' %}
{% block content %}
<h1 class="h4 mb-3">Define — POV/HMW ({{ p['name'] }})</h1>
<form method="post">
 <div class="row g-3">
 <div class="col-md-4"><label class="form-label">User</label><input name="user" class="form-control" placeholder="e.g., Busy product manager"></div>
 <div class="col-md-4"><label class="form-label">Need</label><input name="need" class="form-control" placeholder="compare tools quickly"></div>
 <div class="col-md-4"><label class="form-label">Insight</label><input name="insight" class="form-control" placeholder="they feel overwhelmed by options"></div>
 </div>
 <div class="mt-3 d-flex gap-2">
 <button class="btn btn-primary" type="submit">Generate</button>
 <a class="btn btn-secondary" href="/personas/{{ p['id'] }}">Back</a>
 </div>
</form>
{% endblock %}
