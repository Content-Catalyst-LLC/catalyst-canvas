{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
 <h1 class="h4">Personas</h1>
 <a class="btn btn-primary" href="/personas">New Persona</a>
 <a class="btn btn-outline-primary" href="/personas/import/ga4">Import GA4 CSV</a>
</div>
<ul class="list-group">
 {% for p in personas %}
 <li class="list-group-item d-flex justify-content-between align-items-center">
 <div>
 <strong>{{ p['name'] }}</strong> — {{ p['role'] }} ({{ p['segment'] }})
 </div>
 <a class="btn btn-sm btn-outline-secondary" href="/personas/{{ p['id'] }}">Open</a>
 </li>
 {% else %}
 <li class="list-group-item">No personas yet. Create one.</li>
 {% endfor %}
</ul>
{% endblock %}
