{% extends 'base.html' %}
{% block content %}
<h1 class="h4 mb-3">Empathy Map — {{ p['name'] }}</h1>
<form method="post">
 <div class="row g-3">
 <div class="col-md-6">
 <label class="form-label">Says</label>
 <textarea name="says" class="form-control" rows="4"></textarea>
 </div>
 <div class="col-md-6">
 <label class="form-label">Thinks</label>
 <textarea name="thinks" class="form-control" rows="4"></textarea>
 </div>
 <div class="col-md-6">
 <label class="form-label">Does</label>
 <textarea name="does" class="form-control" rows="4"></textarea>
 </div>
 <div class="col-md-6">
 <label class="form-label">Feels</label>
 <textarea name="feels" class="form-control" rows="4"></textarea>
 </div>
 </div>
 <div class="mt-3 d-flex gap-2">
 <button class="btn btn-primary" type="submit">Save</button>
 <a class="btn btn-secondary" href="/personas/{{ p['id'] }}">Back</a>
 </div>
</form>
{% endblock %}
